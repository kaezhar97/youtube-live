<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: black;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #player {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let player;

      function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
          width: '100%',
          height: '100%',
          videoId: 'VYLr01Q9r6s',
          playerVars: {
            playsinline: 1,
            autoplay: 1,
            mute: 1,
            controls: 1,
            rel: 0,
            origin: 'https://kaezhar97.github.io'
          },
          events: {
            onReady: function(event) {
              event.target.playVideo();
            }
          }
        });
      }
    </script>
  </body>
</html>
